<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenLedger | Secure Personal Finance</title>
  <meta name="description" content="ZenLedger - Decentralized E2EE Personal Finance & Expense Tracker.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      --accent: #10b981;
      --accent-hover: #059669;
      --accent-light: rgba(16, 185, 129, 0.1);
      --expense: #ef4444;
      --income: #10b981;
    }

    [data-theme="light"] {
      --bg-app: #f4f5f7;
      --bg-sidebar: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: rgba(0, 0, 0, 0.08);
      --input-bg: #f8fafc;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-app: #0b0f17;
      --bg-sidebar: #111726;
      --bg-card: #161e2e;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: rgba(255, 255, 255, 0.08);
      --input-bg: #0f172a;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-app);
      color: var(--text-primary);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Auth Overlay */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 15, 23, 0.88);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      outline: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-accent {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-accent:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--input-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    /* Main Container */
    .app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .topbar {
      height: 64px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
    }

    .dashboard-body {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .stat-val {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 700;
    }

    .transactions-table {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tx-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .tx-item:last-child {
      border-bottom: none;
    }

    .tx-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tx-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .tx-icon-income { background: rgba(16, 185, 129, 0.15); color: var(--income); }
    .tx-icon-expense { background: rgba(239, 68, 68, 0.15); color: var(--expense); }

    .tx-amount-income { color: var(--income); font-family: var(--font-mono); font-weight: 700; }
    .tx-amount-expense { color: var(--expense); font-family: var(--font-mono); font-weight: 700; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-md);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- Auth Overlay -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="ti ti-wallet"></i> ZenLedger
      </div>
      <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 24px;">
        Decentralized Zero-Knowledge Personal Finance
      </p>
      <form onsubmit="event.preventDefault(); window.login();">
        <div class="form-group">
          <label class="form-label">Identity</label>
          <input type="text" id="user-input" class="form-input" placeholder="e.g. dev" required>
        </div>
        <div class="form-group">
          <label class="form-label">Master Passphrase</label>
          <input type="password" id="pass-input" class="form-input" placeholder="••••••••••••" required>
        </div>
        <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 10px;">
          <i class="ti ti-lock-open"></i> Unlock Ledger
        </button>
      </form>
    </div>
  </div>

  <div class="app-container">
    <header class="topbar">
      <div class="brand">
        <i class="ti ti-wallet"></i> ZenLedger
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-accent" onclick="openAddModal()">
          <i class="ti ti-plus"></i> Add Transaction
        </button>
        <button class="btn btn-secondary" onclick="toggleTheme()"><i class="ti ti-sun" id="theme-icon"></i></button>
        <button class="btn btn-secondary" onclick="logout()"><i class="ti ti-lock"></i></button>
      </div>
    </header>

    <main class="dashboard-body">
      <!-- Stats Summary -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Net Balance</span>
          <span class="stat-val" id="val-balance">€0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Income</span>
          <span class="stat-val" style="color: var(--income);" id="val-income">+€0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Expenses</span>
          <span class="stat-val" style="color: var(--expense);" id="val-expense">-€0.00</span>
        </div>
      </div>

      <!-- Transactions -->
      <div class="transactions-table">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3 style="font-size: 1.1rem; font-weight: 700;">Recent Transactions</h3>
          <span id="tx-count" style="font-size: 0.8rem; color: var(--text-muted);">0 items</span>
        </div>

        <div id="tx-list">
          <!-- Dynamic Items -->
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="font-size: 1.2rem; font-weight: 700;">Add Transaction</h3>
        <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <form onsubmit="event.preventDefault(); saveTx();">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="tx-type" class="form-select">
            <option value="expense">Expense (-)</option>
            <option value="income">Income (+)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Title / Description</label>
          <input type="text" id="tx-title" class="form-input" placeholder="e.g. Hosting Domain, Studio Gear, Freelance" required>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (€)</label>
          <input type="number" step="0.01" id="tx-amount" class="form-input" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="tx-cat" class="form-select">
            <option value="General">General</option>
            <option value="Tech & Hosting">Tech & Hosting</option>
            <option value="Music & Audio">Music & Audio</option>
            <option value="Freelance & Services">Freelance & Services</option>
            <option value="Subscriptions">Subscriptions</option>
            <option value="Living & Food">Living & Food</option>
          </select>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-accent">Save Transaction</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentTheme = localStorage.getItem('theme') || 'light';
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', currentTheme);
      const icon = document.getElementById('theme-icon');
      if (icon) icon.className = currentTheme === 'light' ? 'ti ti-sun' : 'ti ti-moon';
    }
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      applyTheme();
    }
    document.addEventListener('DOMContentLoaded', applyTheme);
  </script>

  <script type="module">
    import ZEN from 'https://cdn.jsdelivr.net/gh/scobru/zen@main/zen.min.js';

    let zen;
    let pair;
    let transactions = {};

    const relays = ["wss://delay.scobrudot.dev/zen", "wss://zen.akao.io:8420/zen"];
    zen = new ZEN({ peers: relays });

    async function login() {
      const u = document.getElementById('user-input').value || sessionStorage.getItem('zenledger_user');
      const p = document.getElementById('pass-input').value || sessionStorage.getItem('zenledger_pass');
      if (!u || !p) return;

      pair = await ZEN.pair(null, { seed: u + p });
      sessionStorage.setItem('zenledger_user', u);
      sessionStorage.setItem('zenledger_pass', p);
      document.getElementById('auth-overlay').classList.add('hidden');

      zen.get('~' + pair.pub).get('zenledger').map().on((data, soul) => {
        if (!data) delete transactions[soul];
        else transactions[soul] = { soul, ...data };
        render();
      });
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function saveTx() {
      const id = 'tx_' + Date.now();
      const type = document.getElementById('tx-type').value;
      const title = document.getElementById('tx-title').value;
      const amount = parseFloat(document.getElementById('tx-amount').value) || 0;
      const cat = document.getElementById('tx-cat').value;

      const record = { type, title, amount, cat, timestamp: Date.now() };

      zen.get('~' + pair.pub).get('zenledger').get(id).put(record, (ack) => {
        if (!ack.err) closeModal();
      }, { authenticator: pair });
    }

    function deleteTx(soul) {
      if (confirm('Delete transaction?')) {
        zen.get('~' + pair.pub).get('zenledger').get(soul).put(null, null, { authenticator: pair });
      }
    }

    function render() {
      const listContainer = document.getElementById('tx-list');
      listContainer.innerHTML = '';
      const items = Object.values(transactions).sort((a, b) => b.timestamp - a.timestamp);

      let totalIncomeCents = 0;
      let totalExpenseCents = 0;

      items.forEach(tx => {
        const amt = parseFloat(tx.amount) || 0;
        const amtCents = Math.round(amt * 100);
        if (tx.type === 'income') totalIncomeCents += amtCents;
        else totalExpenseCents += amtCents;

        const el = document.createElement('div');
        el.className = 'tx-item';
        el.innerHTML = `
          <div class="tx-left">
            <div class="tx-icon tx-icon-${tx.type}"><i class="ti ti-${tx.type === 'income' ? 'arrow-down-left' : 'arrow-up-right'}"></i></div>
            <div>
              <div style="font-weight: 600;">${escapeHtml(tx.title)}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted);">${escapeHtml(tx.cat)}</div>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 14px;">
            <div class="tx-amount-${tx.type}">${tx.type === 'income' ? '+' : '-'}€${amt.toFixed(2)}</div>
            <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="deleteTx('${escapeJs(tx.soul)}')"><i class="ti ti-trash"></i></button>
          </div>
        `;
        listContainer.appendChild(el);
      });

      const balanceCents = totalIncomeCents - totalExpenseCents;
      document.getElementById('val-balance').textContent = `€${(balanceCents / 100).toFixed(2)}`;
      document.getElementById('val-income').textContent = `+€${(totalIncomeCents / 100).toFixed(2)}`;
      document.getElementById('val-expense').textContent = `-€${(totalExpenseCents / 100).toFixed(2)}`;
      document.getElementById('tx-count').textContent = `${items.length} items`;
    }

    function escapeHtml(str) {
      return (str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function escapeJs(str) {
      return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    window.login = login;
    window.logout = logout;
    window.saveTx = saveTx;
    window.deleteTx = deleteTx;
    window.openAddModal = () => document.getElementById('modal-overlay').classList.remove('hidden');
    window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');

    if (sessionStorage.getItem('zenledger_user') && sessionStorage.getItem('zenledger_pass')) {
      login();
    }
  </script>
</body>

</html>
